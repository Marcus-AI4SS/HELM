name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build Windows artifacts
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File release/build-public-artifacts.ps1 -SkipUiSmoke

      - uses: actions/upload-artifact@v4
        with:
          name: helm-windows-public-candidate
          path: release/artifacts/public-candidate

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build macOS artifacts
        shell: pwsh
        run: pwsh -ExecutionPolicy Bypass -File release/build-public-artifacts.ps1 -SkipUiSmoke

      - uses: actions/upload-artifact@v4
        with:
          name: helm-macos-public-candidate
          path: release/artifacts/public-candidate
