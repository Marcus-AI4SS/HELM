    <main class="content-page">
      <p class="eyebrow">隐私</p>
      <h1>HELM 读取本地状态，公开包不应包含个人材料。</h1>
      <p>
        本仓库没有遥测服务、分析 SDK、托管同步或云后端。
        HELM 在你的电脑上展示本地项目状态；公开发布内容必须与个人数据分离。
      </p>
      <div class="privacy-grid">
        <article>
          <h2>可在本地读取</h2>
          <p>项目说明、证据记录、材料索引、已有文件索引、检查报告和本地设置。</p>
        </article>
        <article>
          <h2>不得进入公开包</h2>
          <p>个人输出、笔记库、浏览器资料、文献数据库、凭据、密钥、Cookie 和本地绝对路径。</p>
        </article>
      </div>
      <p>构建公开包前，发布脚本会运行隐私扫描。</p>
    </main>
  </body>
