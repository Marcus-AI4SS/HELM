name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  public-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Public release gate
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File release/check-public-release.ps1 -SkipUiSmoke

  macos-cargo-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build frontend
        working-directory: apps/desktop
        run: npm run build

      - name: Check Tauri crate
        working-directory: apps/desktop/src-tauri
        run: cargo check

