    <main class="content-page relationship-page">
      <p class="eyebrow">职责分工</p>
      <h1>VELA 提供上下文，HELM 负责看板展示。</h1>
      <p>
        VELA 可以提供本地工作上下文：项目事实、证据痕迹、校验结果和运行状态。
        HELM 读取这些信息并展示给用户。研究判断、写作和后续执行仍回到 Codex。
      </p>
      <div class="diagram">
        <div><strong>VELA</strong><span>本地工作上下文</span></div>
        <div class="arrow">到</div>
        <div><strong>HELM</strong><span>本地项目看板</span></div>
        <div class="arrow">到</div>
        <div><strong>Codex</strong><span>继续研究推进</span></div>
      </div>
      <p>
        二者仓库和职责保持分开。没有 VELA 时，HELM 可以显示空状态或公开安全示例状态。
        配置了兼容的 VELA 环境后，HELM 把它作为本地来源读取并展示。
      </p>
    </main>
